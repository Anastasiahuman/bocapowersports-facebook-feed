name: Update Facebook Feed

on:
  workflow_dispatch:
  schedule:
    # Once per day at 09:00 UTC
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update feed
        run: |
          python update_feed.py --limit 200 --currency USD

      - name: Commit updated feed files
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add output/facebook_feed.csv output/raw_listings.json output/raw_listings.csv output/listing_urls.json
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update facebook feed"
          git push
